name: Import macOS Source Bundle

on:
  push:
    branches: [main]
    paths:
      - "bootstrap/macos-source/READY"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: import-macos-source
  cancel-in-progress: false

jobs:
  import:
    name: Verify and import macOS adapter source
    runs-on: macos-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reassemble source bundle
        shell: bash
        run: |
          set -euo pipefail
          test -f bootstrap/macos-source/manifest.env
          source bootstrap/macos-source/manifest.env
          cat bootstrap/macos-source/parts/*.b64 > /tmp/presenceguard-macos-source.b64
          base64 --decode /tmp/presenceguard-macos-source.b64 > /tmp/presenceguard-macos-source.tar.gz
          echo "${SHA256}  /tmp/presenceguard-macos-source.tar.gz" | shasum -a 256 --check
          test "$(stat -f%z /tmp/presenceguard-macos-source.tar.gz)" = "${BYTES}"

      - name: Validate archive paths
        shell: bash
        run: |
          set -euo pipefail
          tar -tzf /tmp/presenceguard-macos-source.tar.gz | sed 's#^./##' | while IFS= read -r path; do
            case "$path" in
              crates/presenceguard-macos|crates/presenceguard-macos/*|scripts|scripts/*|rust-toolchain.toml) ;;
              "") ;;
              *) echo "Unexpected archive path: $path" >&2; exit 1 ;;
            esac
          done

      - name: Extract adapter source
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/presenceguard-macos-source.tar.gz --no-same-owner
          test -f crates/presenceguard-macos/Cargo.toml
          test -f crates/presenceguard-macos/src/main.rs
          test -f crates/presenceguard-macos/macos/PGBridge.m
          test -f scripts/build-app.sh
          chmod +x scripts/build-app.sh scripts/install-app.sh

      - name: Update workspace manifest
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('Cargo.toml')
          value = path.read_text()
          if '"crates/presenceguard-macos"' not in value:
              value = value.replace('"crates/presence-core",', '"crates/presence-core",\n  "crates/presenceguard-macos",')
              path.write_text(value)
          PY

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Validate Rust workspace
        shell: bash
        run: |
          cargo fmt --all -- --check
          cargo clippy -p presence-core --all-targets -- -D warnings
          cargo test -p presence-core --all-targets
          cargo build -p presenceguard-macos --release

      - name: Commit imported source
        shell: bash
        run: |
          set -euo pipefail
          rm -rf bootstrap/macos-source
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml rust-toolchain.toml crates/presenceguard-macos scripts bootstrap
          git diff --cached --quiet && exit 0
          git commit -m "feat(macos): import native adapter source"
          git push
